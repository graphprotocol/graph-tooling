name: Tests
env:
  NODE_NO_WARNINGS: true
on:
  push:
    branches:
      - 'main'
  pull_request:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}

      - uses: ./.github/actions/setup-node
        name: Setup Env
        with:
          nodeVersion: 22
          packageManager: pnpm
          packageManagerVersion: 9

      - name: Lint
        run: pnpm lint

  cli:
    name: CLI / nodejs v${{ matrix.node-version }}
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}

      - uses: ./.github/actions/setup-node
        name: Setup Env
        with:
          nodeVersion: ${{ matrix.node-version }}
          packageManager: pnpm
          packageManagerVersion: 9

      - name: Setup git user information
        run: |
          git config --global user.name "$(git log -n 1 --pretty=format:%an)"
          git config --global user.email "$(git log -n 1 --pretty=format:%ae)"

      - name: Build Packages
        run: pnpm build # will also check types

      - name: Run Tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: pnpm run test:cli

  event-handler:
    name: Ethereum Basic Event Handlers
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}

      - uses: ./.github/actions/setup-node
        name: Setup Env
        with:
          nodeVersion: 22
          packageManager: pnpm
          packageManagerVersion: 9

      - name: Build Packages
        run: pnpm build

      - name: Should re-link local workspace deps?
        run: pnpm i

      - name: Run Tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: pnpm run --filter="example-ethereum-basic-event-handlers" test

  ts:
    name: Graph TS
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}

      - uses: ./.github/actions/setup-node
        name: Setup Env
        with:
          nodeVersion: 22
          packageManager: pnpm
          packageManagerVersion: 9

      - name: Build Packages
        run: pnpm build # will also check types

      - name: Run Tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: pnpm run test:ts
